name: AI Security Scan

on:
  push:
    branches:
      - main

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install requests

      - name: Run StackSpot AI Scan
        env:
          STACKSPOT_CLIENT_ID: ${{ secrets.STACKSPOT_CLIENT_ID }}
          STACKSPOT_CLIENT_SECRET: ${{ secrets.STACKSPOT_CLIENT_SECRET }}
          STACKSPOT_REALM: stackspot-freemium
        run: python stackspot_scan.py

      - name: Upload security report
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: security_report.json
          if-no-files-found: warn

      - name: Upload conversation id
        uses: actions/upload-artifact@v4
        with:
          name: conversation-id
          path: conversation_id.txt
          if-no-files-found: warn
